
<!DOCTYPE html>
<html lang="en" data-bs-theme="auto">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="chrome=1">
        <title>{{page.title}}</title>
        <link href="{{ '/assets/css/bootstrap.min.css' | relative_url }}" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="{{ '/assets/css/otdmug.css' | relative_url }}">
        <!--[if lt IE 9]>
        <script src="//html5shiv.googlecode.com/svn/trunk/html5.js"></script>
        <![endif]-->
    </head> 
    <body> 
        {% include header.html %}

        <div class="container text-left">
            <div class="row">
                <div class="col-12 col-lg-9">
                    {% for post in site.posts %}
                        <p>{{post.date | date: "%B %d, %Y"}}: <a href="{{ post.url | relative_url }}">{{ post.title }}</a></p>
                    {% endfor %}

                </div>
                <div class="col-3 text-left">
                    
                </div>
            </div>
        </div>
    </body>
</html>
